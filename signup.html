<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VR Fashion Signup</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(to right,#a100ff,#ff6f91);
    }

    /* NAVBAR */

    nav{
      width:100%;
      background:#5a0b53;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:25px 30px;
      position:fixed;
      top:0;
      left:0;
      z-index:1000;
    }

    .logo{
      color:white;
      text-decoration:none;
      font-size:28px;
      font-weight:bold;
    }

    .nav-links{
      display:flex;
      gap:55px;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      font-size:18px;
      font-weight:bold;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:#ffd6f5;
    }

    .search-box input{
      width:240px;
      padding:12px 15px;
      border:none;
      border-radius:12px;
      outline:none;
      font-size:16px;
    }

    .buttons{
      display:flex;
      gap:20px;
    }

    .buttons a{
      text-decoration:none;
    }

    .buttons button{
      padding:12px 28px;
      border:none;
      border-radius:40px;
      background:white;
      color:#5a0b53;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .buttons button:hover{
      background:#f5d3f5;
    }

    /* SIGNUP BOX */

    .container{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding-top:120px;
    }

    .signup-box{
      width:500px;
      background:#f2f2f2;
      padding:50px 40px;
      border-radius:25px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .signup-box h1{
      text-align:center;
      margin-bottom:40px;
      color:black;
      font-size:45px;
    }

    .input-box{
      width:100%;
      margin-bottom:25px;
    }

    .input-box input{
      width:100%;
      padding:18px;
      border:2px solid #ddd;
      border-radius:12px;
      font-size:18px;
      outline:none;
    }

    .input-box input:focus{
      border-color:#a100ff;
    }

    .signup-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(to right,#a100ff,#d400ff);
      color:white;
      font-size:24px;
      cursor:pointer;
      transition:0.3s;
    }

    .signup-btn:hover{
      transform:scale(1.02);
    }

    .login-text{
      text-align:center;
      margin-top:25px;
      font-size:18px;
    }

    .login-text a{
      color:#8e2de2;
      text-decoration:none;
      font-weight:bold;
    }

    .login-text a:hover{
      text-decoration:underline;
    }

    /* RESPONSIVE */

    @media(max-width:900px){

      nav{
        flex-direction:column;
        gap:20px;
      }

      .nav-links{
        flex-wrap:wrap;
        justify-content:center;
      }

      .container{
        padding:220px 20px 40px;
      }

      .signup-box{
        width:100%;
      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <a href="home.html" class="logo">VR Fashion</a>

    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="choose.html">Why Choose Us</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Contact Us</a>
    </div>

    <div class="search-box">
      <input type="search" placeholder="Search here... 🔍">
    </div>

    <div class="buttons">

      <a href="login.html">
        <button>Login</button>
      </a>

      <a href="signup.html">
        <button>Signup</button>
      </a>

    </div>

  </nav>

  <!-- SIGNUP FORM -->

  <div class="container">

    <div class="signup-box">

      <h1>Signup</h1>

      <form>

        <div class="input-box">
          <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Create Password" required>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="signup-btn">
          Signup
        </button>

      </form>

      <div class="login-text">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </div>

  </div>

</body>

</html>
